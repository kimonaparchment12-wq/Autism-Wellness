kind = "web"
previewPath = "/"
title = "Vashawn - Social Skills Game"
version = "1.0.0"
id = "artifacts/vashawn-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26141
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vashawn-game run dev"

[services.env]
PORT = "26141"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vashawn-game", "run", "build"]
publicDir = "artifacts/vashawn-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
