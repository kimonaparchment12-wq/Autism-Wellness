packages:
  "framer-motion": "Smooth animations and glassy effects for premium UI feel"
  "lucide-react": "Beautiful consistent icons"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation for forms"
  "canvas-confetti": "Celebratory effects for ranking up"
